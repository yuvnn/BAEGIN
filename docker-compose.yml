services:
  vue-project:
    build: ./vue-project
    ports:
      - "15173:80"
    depends_on:
      - auth-server
      - user-service
      - paper-service
      - monitoring-service

  auth-server:
    build: ./auth-server
    environment:
      - SERVICE_NAME=auth-server
    ports:
      - "18081:8000"

  user-service:
    build: ./user-service
    environment:
      - SERVICE_NAME=user-service
    ports:
      - "18082:8000"

  paper-service:
    build: ./paper-service
    environment:
      - SERVICE_NAME=paper-service
    ports:
      - "18083:8000"

  internal-service:
    build: ./internal-service
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PAPERS=papers
      - CHROMA_COLLECTION_INTERNAL=internal_docs
    ports:
      - "18084:8000"
    depends_on:
      - chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  monitoring-service:
    build: ./monitoring-service
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PAPERS=papers
      - CHROMA_COLLECTION_INTERNAL=internal_docs
      - INTERNAL_SERVICE_URL=http://internal-service:8000
    ports:
      - "18085:8000"
    volumes:
      - ./data/reports:/app/reports
    depends_on:
      chroma:
        condition: service_started
      internal-service:
        condition: service_healthy

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "18090:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
