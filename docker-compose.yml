services:
  vue-project:
    build: ./vue-project
    ports:
      - "15173:80"
    depends_on:
      - auth-server
      - user-service
      - paper-service
      - monitoring-service

  auth-server:
    build: ./auth-server
    environment:
      - SERVICE_NAME=auth-server
    ports:
      - "18081:8000"

  user-service:
    build: ./user-service
    environment:
      - SERVICE_NAME=user-service
    ports:
      - "18082:8000"

  paper-service:
    build: ./paper-service
    environment:
      - SERVICE_NAME=paper-service
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PAPERS=papers
      - CHROMA_COLLECTION_INTERNAL=internal_docs
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC_PAPERS=new_papers_topic
      - DATABASE_URL=mysql+pymysql://baegin_user:baegin_password@mariadb:3306/baegin_db
    ports:
      - "18083:8000"
    depends_on:
      chroma:
        condition: service_started
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  internal-service:
    build: ./internal-service
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PAPERS=papers
      - CHROMA_COLLECTION_INTERNAL=internal_docs
    ports:
      - "18084:8000"
    depends_on:
      - chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  monitoring-service:
    build: ./monitoring-service
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PAPERS=papers
      - CHROMA_COLLECTION_INTERNAL=internal_docs
      - INTERNAL_SERVICE_URL=http://internal-service:8000
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC_PAPERS=new_papers_topic
    ports:
      - "18085:8000"
    volumes:
      - ./data/reports:/app/reports
    depends_on:
      chroma:
        condition: service_started
      internal-service:
        condition: service_healthy
      kafka:
        condition: service_healthy

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "18090:8000"
    volumes:
      - ./data/chroma:/chroma/chroma

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: baegin_db
      MYSQL_USER: baegin_user
      MYSQL_PASSWORD: baegin_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mariadb_data:

