server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: auth
          uri: lb://auth-server
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: papers
          uri: lb://paper-service
          predicates:
            - Path=/api/papers/**
          filters:
            - StripPrefix=1

        - id: monitor
          uri: lb://monitoring-service
          predicates:
            - Path=/api/monitor/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:default-dev-secret-at-least-32-chars!!}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG
    com.lecture.gateway.filter: DEBUG
